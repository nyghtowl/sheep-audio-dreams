<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Voice Agents — Streaming Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
  header { padding: 1.5rem 2rem; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header .badge { font-size: 0.7rem; background: #2d6a4f; color: #95d5b2; padding: 2px 8px; border-radius: 12px; }
  .container { max-width: 860px; margin: 0 auto; padding: 2rem; }
  .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  button { padding: 0.5rem 1.25rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: opacity 0.15s; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-start { background: #2d6a4f; color: #fff; }
  #btn-next  { background: #4a4e69; color: #fff; }
  #btn-stop  { background: #6b2737; color: #fff; }
  .status-bar { font-size: 0.8rem; color: #888; margin-left: auto; }
  .speaking-indicator { display: none; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
  .speaking-indicator.active { display: flex; }
  .dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 1s infinite; }
  .dot.lyra  { background: #4a9e6d; }
  .dot.zara  { background: #9b59b6; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .narration { background: #16213e; border-left: 3px solid #e2b96f; padding: 1rem 1.25rem; border-radius: 4px; margin-bottom: 1.5rem; font-style: italic; color: #c9a84c; font-size: 0.9rem; line-height: 1.6; display: none; }
  .chat { display: flex; flex-direction: column; gap: 0.75rem; }
  .message { padding: 0.75rem 1rem; border-radius: 8px; max-width: 75%; font-size: 0.9rem; line-height: 1.5; }
  .message.lyra  { background: #1a3a2a; border-left: 3px solid #4a9e6d; align-self: flex-start; }
  .message.zara  { background: #2a1a3a; border-left: 3px solid #9b59b6; align-self: flex-end; }
  .message .name { font-size: 0.7rem; font-weight: 600; margin-bottom: 0.25rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.05em; }
  .message.lyra .name { color: #4a9e6d; }
  .message.zara .name { color: #9b59b6; }
  .message.typing .text::after { content: "▋"; animation: blink 0.7s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  .error-banner { background: #3a1a1a; border: 1px solid #6b2737; color: #e07070; padding: 0.75rem 1rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
</style>
</head>
<body>

<header>
  <span>⚔️</span>
  <h1>D&D Voice Agents — The Wild Sheep Chase</h1>
  <span class="badge">WebSocket Streaming</span>
</header>

<div class="container">
  <div class="error-banner" id="error-banner"></div>

  <div class="controls">
    <button id="btn-start">Start Adventure</button>
    <button id="btn-next" disabled>Next Turn</button>
    <button id="btn-stop" disabled>Stop</button>
    <div class="speaking-indicator" id="speaking-indicator">
      <div class="dot" id="speaking-dot"></div>
      <span id="speaking-name"></span> is speaking…
    </div>
    <div class="status-bar" id="status">Not started</div>
  </div>

  <div class="narration" id="narration"></div>
  <div class="chat" id="chat"></div>
</div>

<script>
const sessionId = Math.random().toString(36).slice(2, 10);
const ws = new WebSocket(`ws://${location.host}/ws/${sessionId}`);
ws.binaryType = "arraybuffer";

// Web Audio context — created on first user gesture to satisfy browser policy
let audioCtx = null;
// Queue of AudioBufferSourceNode scheduled ahead for gapless playback
let nextStartTime = 0;
const SAMPLE_RATE = 24000;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
    nextStartTime = audioCtx.currentTime;
  }
  return audioCtx;
}

function playPCM16(arrayBuffer) {
  const ctx = getAudioCtx();
  const pcm = new Int16Array(arrayBuffer);
  const float32 = new Float32Array(pcm.length);
  for (let i = 0; i < pcm.length; i++) float32[i] = pcm[i] / 32768;
  const buffer = ctx.createBuffer(1, float32.length, SAMPLE_RATE);
  buffer.copyToChannel(float32, 0);
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  src.connect(ctx.destination);
  // Schedule gaplessly: start at nextStartTime or now if we've fallen behind
  const when = Math.max(nextStartTime, ctx.currentTime);
  src.start(when);
  nextStartTime = when + buffer.duration;
}

function stopAudio() {
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
    nextStartTime = 0;
  }
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------

const $ = id => document.getElementById(id);

function setStatus(text) { $("status").textContent = text; }

function showError(msg) {
  const el = $("error-banner");
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 6000);
}

function setSpeaking(agentName) {
  const ind = $("speaking-indicator");
  const dot = $("speaking-dot");
  const name = $("speaking-name");
  if (agentName) {
    ind.classList.add("active");
    dot.className = "dot " + agentName.toLowerCase();
    name.textContent = agentName;
  } else {
    ind.classList.remove("active");
  }
}

let currentTypingEl = null;

function addMessage(agentName, text, typing = false) {
  const chat = $("chat");
  const div = document.createElement("div");
  div.className = "message " + agentName.toLowerCase() + (typing ? " typing" : "");
  div.innerHTML = `<div class="name">${agentName}</div><div class="text">${text}</div>`;
  chat.appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "end" });
  return div;
}

function finaliseMessage(el, text) {
  el.classList.remove("typing");
  el.querySelector(".text").textContent = text;
}

// ---------------------------------------------------------------------------
// WebSocket message handling
// ---------------------------------------------------------------------------

ws.onmessage = (event) => {
  if (event.data instanceof ArrayBuffer) {
    // Audio chunk — play it
    playPCM16(event.data);
    return;
  }

  const msg = JSON.parse(event.data);

  if (msg.type === "narration") {
    const el = $("narration");
    el.textContent = msg.text;
    el.style.display = "block";

  } else if (msg.type === "ready") {
    $("btn-next").disabled = false;
    $("btn-stop").disabled = false;
    $("btn-start").disabled = true;
    setStatus("Ready — click Next Turn");

  } else if (msg.type === "turn_start") {
    setSpeaking(msg.agent);
    currentTypingEl = addMessage(msg.agent, "", true);
    setStatus(`Turn ${msg.turn} — ${msg.agent} speaking`);

  } else if (msg.type === "turn_done") {
    setSpeaking(null);
    if (currentTypingEl) {
      finaliseMessage(currentTypingEl, msg.transcript || "");
      currentTypingEl = null;
    } else {
      addMessage(msg.agent, msg.transcript || "");
    }
    setStatus(`Turn ${msg.turn} complete — click Next Turn`);
    $("btn-next").disabled = false;

  } else if (msg.type === "audio_done") {
    // All audio for this turn has been sent
    setSpeaking(null);

  } else if (msg.type === "turn_retrying") {
    stopAudio();
    setStatus("Connection dropped — retrying turn…");

  } else if (msg.type === "stopped") {
    stopAudio();
    $("btn-next").disabled = true;
    $("btn-stop").disabled = true;
    $("btn-start").disabled = false;
    setSpeaking(null);
    setStatus("Stopped");

  } else if (msg.type === "error") {
    showError(msg.message);
    $("btn-next").disabled = false;
    setStatus("Error — try Next Turn again");
  }
};

ws.onerror = () => showError("WebSocket error — is the server running?");
ws.onclose = () => setStatus("Disconnected");

// ---------------------------------------------------------------------------
// Button handlers
// ---------------------------------------------------------------------------

$("btn-start").addEventListener("click", () => {
  // Resume AudioContext on user gesture
  getAudioCtx();
  $("btn-start").disabled = true;
  setStatus("Starting…");
  ws.send(JSON.stringify({ type: "start" }));
});

$("btn-next").addEventListener("click", () => {
  $("btn-next").disabled = true;
  setStatus("Requesting turn…");
  ws.send(JSON.stringify({ type: "next_turn" }));
});

$("btn-stop").addEventListener("click", () => {
  stopAudio();
  ws.send(JSON.stringify({ type: "stop" }));
});
</script>
</body>
</html>
